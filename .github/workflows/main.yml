name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}] # Mise à jour chaque nuit
  workflow_dispatch: # Permet de lancer manuellement
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Première carte : En-tête et Infos Générales
      - uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics.svg
          base: header, activity, community, repositories
          config_timezone: Europe/Paris
          config_padding: 0, 8%

      # Deuxième carte : Langages + Achievements
      # Note: METRICS_TOKEN requires "repo" scope for plugin_languages_indepth
      - uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-stats.svg
          template: classic
          base: ""

          # Section Langages
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_indepth: yes
          plugin_languages_details: percentage
          plugin_languages_limit: 8

          # Section Achievements
          plugin_achievements: yes
          plugin_achievements_threshold: B
          plugin_achievements_display: detailed
          plugin_achievements_limit: 10

          # Paramètres de rendu
          config_padding: 0, 10%
          config_output: svg
          config_order: languages, achievements
